spring.application.name=todoApp

# MySQL Database Configuration for Development
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/tododb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=todoapp
spring.datasource.password=TodoApp@2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history

# JWT Configuration for Development
jwt.secret=dev-secret-key-min-256-bits-long-change-this-in-production-do-not-use-in-production
jwt.expiration=86400000
