services:
  mysql:
    image: 'mysql:8.0'
    environment:
      - 'MYSQL_DATABASE=tododb'
      - 'MYSQL_PASSWORD=${DB_PASSWORD:-secret}'
      - 'MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-secret}'
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
